name: Build desktop app

# Builds the installable Windows .exe (NSIS setup + a portable single-file exe)
# automatically. Grab them from the run's Artifacts, or push a `v*` tag to cut
# a GitHub Release with the .exe files attached.
on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write          # needed to attach binaries to a Release on tags

jobs:
  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer + portable exe
        run: npm run dist:win

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BIOEVOLUTION-windows
          path: |
            dist/*.exe
          if-no-files-found: error

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
